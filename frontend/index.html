// ───────────────────────────────────────────────────────────────────
//                       Decision Ledger
// ───────────────────────────────────────────────────────────────────
function DecisionLedger({ project, entries }) {
  const [actorFilter, setActorFilter] = useState('all');
  const [actionFilter, setActionFilter] = useState('all');

  if (!project) {
    return (
      <div className="coming-soon">
        <div className="cs-icon">📜</div>
        <h2>Select a project</h2>
        <p>The Decision Ledger shows the audit trail of every plan, approval, execution and review in a project.</p>
      </div>
    );
  }

  // Normalize actor (anything not 'ai'/'pm'/'engineer' is treated as a username)
  const classifyActor = (a) => {
    const al = (a || '').toLowerCase();
    if (al === 'ai') return 'ai';
    if (al === 'pm') return 'pm';
    if (al === 'engineer' || al === 'eng') return 'eng';
    // names sent by usernames — guess by context if needed; default to pm for now
    return 'pm';
  };

  const filtered = entries.filter(e => {
    if (actorFilter !== 'all' && classifyActor(e.actor) !== actorFilter) return false;
    if (actionFilter !== 'all') {
      if (actionFilter === 'plans'      && !['plan_drafted','plan_iterated','plan_approved'].includes(e.action)) return false;
      if (actionFilter === 'executions' && !['execution_started','execution_completed'].includes(e.action))      return false;
      if (actionFilter === 'reviews'    && !['review_approved','review_rejected'].includes(e.action))            return false;
    }
    return true;
  });

  // Group by day
  const groups = {};
  filtered.forEach(e => {
    const d = new Date(e.timestamp);
    const key = d.toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  const dayKeys = Object.keys(groups);
  // Most recent first within each day
  dayKeys.forEach(k => groups[k].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
  // Most recent days first
  dayKeys.sort((a, b) => new Date(groups[b][0].timestamp) - new Date(groups[a][0].timestamp));

  const actorLabel = (e) => {
    const cls = classifyActor(e.actor);
    if (cls === 'ai') return 'AI Agent';
    // Use raw name (could be "Sarah", "pm", etc.)
    return e.actor || 'Unknown';
  };

  const formatAction = (a) => a.replace(/_/g, ' ');

  return (
    <div className="dl-wrap">
      <div className="dl-inner">
        <div className="dl-head">
          <h1 className="dl-title">Decision Ledger · {project.name}</h1>
          <div className="dl-sub">Full audit trail of every plan, execution, and review. Filter to focus on specific actors or action types.</div>
          <div className="dl-filters">
            <span className="dl-filter-label">Actor</span>
            <div className="dl-filter-group">
              <button className={actorFilter === 'all' ? 'active' : ''} onClick={() => setActorFilter('all')}>All</button>
              <button className={actorFilter === 'pm' ? 'active' : ''} onClick={() => setActorFilter('pm')}>PM</button>
              <button className={actorFilter === 'eng' ? 'active' : ''} onClick={() => setActorFilter('eng')}>Engineer</button>
              <button className={actorFilter === 'ai' ? 'active' : ''} onClick={() => setActorFilter('ai')}>AI</button>
            </div>
            <span className="dl-filter-label" style={{ marginLeft: 8 }}>Action</span>
            <div className="dl-filter-group">
              <button className={actionFilter === 'all' ? 'active' : ''} onClick={() => setActionFilter('all')}>All</button>
              <button className={actionFilter === 'plans' ? 'active' : ''} onClick={() => setActionFilter('plans')}>Plans</button>
              <button className={actionFilter === 'executions' ? 'active' : ''} onClick={() => setActionFilter('executions')}>Executions</button>
              <button className={actionFilter === 'reviews' ? 'active' : ''} onClick={() => setActionFilter('reviews')}>Reviews</button>
            </div>
            <span style={{ marginLeft: 'auto', fontSize: 11, fontFamily: 'JetBrains Mono, monospace', color: 'var(--ink-faint)' }}>
              {filtered.length} of {entries.length} entries
            </span>
          </div>
        </div>

        {filtered.length === 0 ? (
          <div className="dl-empty">
            <div style={{ fontSize: 32, marginBottom: 12 }}>📜</div>
            <div>No entries match this filter.</div>
            <div style={{ fontSize: 12, marginTop: 6 }}>Try changing the actor or action filter.</div>
          </div>
        ) : (
          dayKeys.map(day => (
            <div key={day} className="dl-day-group">
              <div className="dl-day-header">{day}</div>
              <div className="dl-timeline">
                {groups[day].map(e => {
                  const cls = classifyActor(e.actor);
                  const time = new Date(e.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                  return (
                    <div key={e.id} className={`dl-entry ${cls}`}>
                      <div className="dl-entry-head">
                        <span className="dl-time">{time}</span>
                        <span className={`dl-actor ${cls}`}>{actorLabel(e)}</span>
                        <span className={`dl-action-pill ${e.action}`}>{formatAction(e.action)}</span>
                        {e.plan_id && (
                          <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5, color: 'var(--ink-faint)' }}>
                            plan {e.plan_id.slice(0, 8)}
                          </span>
                        )}
                      </div>
                      <div className="dl-summary">{e.summary}</div>
                      {e.meta && Object.keys(e.meta).length > 0 && (
                        <div className="dl-meta">{JSON.stringify(e.meta)}</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────────────
//                          App shell
// ───────────────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState('mission');
  const [projects, setProjects] = useState([]);
  const [currentProjectId, setCurrentProjectId] = useState(localStorage.getItem('lastProjectId') || '');
  const [username, setUsername] = useState(localStorage.getItem('username') || '');
  const [role, setRole] = useState(localStorage.getItem('chatRole') || 'pm');
  const [plan, setPlan] = useState(null);
  const [planDrafting, setPlanDrafting] = useState(false);
  const [executing, setExecuting] = useState(false);
  const [artifacts, setArtifacts] = useState([]);
  const [ledger, setLedger] = useState([]);
  const [dashboard, setDashboard] = useState(null);
  const [jumpToast, setJumpToast] = useState(null);  // { msg, color } | null

  const currentProject = useMemo(() => projects.find(p => p.id === currentProjectId), [projects, currentProjectId]);

  useEffect(() => { localStorage.setItem('username', username || ''); }, [username]);
  useEffect(() => { localStorage.setItem('chatRole', role); }, [role]);
  useEffect(() => { if (currentProjectId) localStorage.setItem('lastProjectId', currentProjectId); }, [currentProjectId]);

  // Load projects (and reset selection if stored ID no longer exists)
  useEffect(() => {
    fetch(`${API}/api/projects`).then(r => r.json()).then(d => {
      const ps = d.projects || [];
      setProjects(ps);
      const stillExists = ps.some(p => p.id === currentProjectId);
      if (!stillExists && ps.length) {
        setCurrentProjectId(ps[0].id);
      } else if (!ps.length) {
        setCurrentProjectId('');
      }
    });
  }, []);

  // When project changes, load its latest plan + artifacts + ledger
  useEffect(() => {
    if (!currentProjectId) { setPlan(null); setArtifacts([]); setLedger([]); return; }
    fetch(`${API}/api/projects/${currentProjectId}/plans`)
      .then(r => r.json())
      .then(d => {
        const plans = d.plans || [];
        if (plans.length) {
          const latest = plans[plans.length - 1];
          setPlan(latest);
          return fetch(`${API}/api/projects/${currentProjectId}/plans/${latest.id}/artifacts`)
            .then(r => r.json())
            .then(d2 => setArtifacts(d2.artifacts || []));
        } else {
          setPlan(null);
          setArtifacts([]);
        }
      });
    fetch(`${API}/api/projects/${currentProjectId}/ledger`)
      .then(r => r.json())
      .then(d => setLedger(d.entries || []));
  }, [currentProjectId]);

  // Poll ledger every 5s so new events surface
  useEffect(() => {
    if (!currentProjectId) return;
    const id = setInterval(() => {
      if (document.hidden) return;
      fetch(`${API}/api/projects/${currentProjectId}/ledger`)
        .then(r => r.json())
        .then(d => setLedger(prev => {
          const next = d.entries || [];
          if (prev.length !== next.length) return next;
          return prev;
        }))
        .catch(() => {});
    }, 5000);
    return () => clearInterval(id);
  }, [currentProjectId]);

  // Fetch dashboard rollup + poll
  useEffect(() => {
    const fetchDash = () => {
      fetch(`${API}/api/dashboard`).then(r => r.json()).then(setDashboard).catch(() => {});
    };
    fetchDash();
    const id = setInterval(() => { if (!document.hidden) fetchDash(); }, 5000);
    return () => clearInterval(id);
  }, []);

  // ChatRail uses these callbacks to signal plan lifecycle
  const planCallbacks = useMemo(() => ({
    start: () => { setPlanDrafting(true); setPlan(null); setActive('mission'); },
    done:  (p) => { setPlanDrafting(false); setPlan(p); },
    fail:  () => { setPlanDrafting(false); },
  }), []);

  const approvePlan = useCallback(async (p) => {
    try {
      const res = await fetch(`${API}/api/projects/${currentProjectId}/plans/${p.id}/approve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requested_by: username || role }),
      });
      const updated = await res.json();
      setPlan(updated);

      // Auto-kick off execution and jump to Live Execution
      setExecuting(true);
      setArtifacts([]);
      setJumpToast({ msg: 'AI started execution — jumping to Live Execution', color: 'cyan' });
      setTimeout(() => setActive('live'), 250);
      setTimeout(() => setJumpToast(null), 3500);

      // Fire execute in background
      try {
        const exRes = await fetch(`${API}/api/projects/${currentProjectId}/plans/${p.id}/execute`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ requested_by: 'AI' }),
        });
        if (exRes.ok) {
          const data = await exRes.json();
          setPlan(data.plan);
          setArtifacts(data.artifacts || []);
        } else {
          const err = await exRes.json().catch(() => ({}));
          alert('Execution failed: ' + (err.detail || 'unknown error'));
        }
      } catch (e) {
        console.error('execute error', e);
        alert('Execution failed: network error');
      } finally {
        setExecuting(false);
      }
    } catch (e) { console.error('approve error', e); }
  }, [currentProjectId, username, role]);

  const jumpToReview = useCallback(async (planRef) => {
    // Switch project to the one this plan belongs to, then go to approval tab
    if (planRef.project_id !== currentProjectId) {
      setCurrentProjectId(planRef.project_id);
    }
    // Fetch the plan + its artifacts
    try {
      const [planRes, artRes] = await Promise.all([
        fetch(`${API}/api/projects/${planRef.project_id}/plans/${planRef.plan_id}`).then(r => r.json()),
        fetch(`${API}/api/projects/${planRef.project_id}/plans/${planRef.plan_id}/artifacts`).then(r => r.json()),
      ]);
      setPlan(planRes);
      setArtifacts(artRes.artifacts || []);
    } catch (e) { console.error('jumpToReview', e); }
    setActive('approval');
  }, [currentProjectId]);

  const reviewPlan = useCallback(async (decision, notes) => {
    if (!plan || !currentProjectId) return;
    try {
      const res = await fetch(`${API}/api/projects/${currentProjectId}/plans/${plan.id}/review`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ decision, notes: notes || '', requested_by: username || role }),
      });
      if (res.ok) {
        const updated = await res.json();
        setPlan(updated);
        if (decision === 'approve') {
          setJumpToast({ msg: 'Approved & shipped — see audit trail in Decision Ledger', color: 'amber' });
          setTimeout(() => setJumpToast(null), 3000);
        }
      } else {
        const err = await res.json().catch(() => ({}));
        alert('Review failed: ' + (err.detail || 'unknown'));
      }
    } catch (e) { console.error('review error', e); }
  }, [plan, currentProjectId, username, role]);

  const createProject = useCallback(async () => {
    const name = prompt('Project name:');
    if (!name) return;
    const background = prompt('Brief project background:') || '';
    const res = await fetch(`${API}/api/projects`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, background }),
    });
    const p = await res.json();
    setProjects(prev => [...prev, p]);
    setCurrentProjectId(p.id);
  }, []);

  const memberLabel = `${username || 'You'} + AI`;

  return (
    <div className="app">
      <header className="topbar">
        <div className="brand">
          <span className="logo">TB</span>
          <span className="brand-name">TechBridge AI</span>
          <span className="ver">v0.5 · DEMO</span>
        </div>
        <nav className="nav" role="tablist">
          {TABS.map(t => (
            <button
              key={t.id} role="tab" aria-selected={active === t.id}
              className={active === t.id ? 'active' : ''}
              onClick={() => setActive(t.id)}
            >
              <span className="num">{t.num}</span>{t.label}
            </button>
          ))}
        </nav>
        <div className="right">
          <input className="user-input" placeholder="Your name" value={username} onChange={e => setUsername(e.target.value)} />
          <select className="project-select" value={currentProjectId} onChange={e => {
              if (e.target.value === '__new__') { createProject(); }
              else setCurrentProjectId(e.target.value);
          }}>
            <option value="" disabled>Select project…</option>
            {projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            <option value="__new__">+ New project…</option>
          </select>
          <span className="pulse-status"><span className="dot"></span>System healthy</span>
        </div>
      </header>

      <div className="app-body">
        <ChatRail
          projectId={currentProjectId}
          project={currentProject}
          username={username}
          role={role}
          setRole={setRole}
          members={memberLabel}
          onPlanCreated={planCallbacks}
        />
        <main className="screen">
          {active === 'mission'  && (
            <MissionControl
              project={currentProject}
              plan={plan}
              planDrafting={planDrafting}
              onApprove={approvePlan}
              onSwitchTab={setActive}
            />
          )}
          {active === 'live' && (
            <LiveExecution
              project={currentProject}
              plan={plan}
              executing={executing}
              artifacts={artifacts}
              onSwitchTab={setActive}
            />
          )}
          {active === 'approval' && (
            <ApprovalGate
              project={currentProject}
              plan={plan}
              artifacts={artifacts}
              onDecision={reviewPlan}
              onSwitchTab={setActive}
            />
          )}
          {active === 'ledger' && (
            <DecisionLedger project={currentProject} entries={ledger} />
          )}
          {active === 'command' && (
            <CommandSeat dashboard={dashboard} username={username} onJumpToReview={jumpToReview} />
          )}
        </main>
      </div>
      {jumpToast && (
        <div className={`jump-toast ${jumpToast.color === 'amber' ? 'amber' : ''}`}>
          <span className={`jump-dot ${jumpToast.color === 'amber' ? 'amber' : ''}`}></span>
          {jumpToast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
